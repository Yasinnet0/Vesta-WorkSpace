name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on any tag like v1.0.0
  workflow_dispatch: # Allows you to run it manually from the Actions tab

permissions:
  contents: write # REQUIRED: Allows the bot to create releases and upload files

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Frontend Assets
        run: npm run build

      - name: Package and Publish Desktop Installer
        run: npx electron-builder --win --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If you use code signing in the future, you add your certificates here
