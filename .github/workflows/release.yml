name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow whenever you push a tag like v1.0.0

permissions:
  contents: write # CRITICAL: Allows uploading package files to GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Caches npm packages for faster runs

      - name: Install Dependencies
        run: npm ci

      - name: Compile Frontend Assets
        run: npm run build

      - name: Package and Publish Desktop Installer
        run: npx electron-builder --win --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
